<div class="card" style="max-width: 500px; margin: 2rem auto;">
  <h2>Confirmar Reserva</h2>
  
  <div *ngIf="mensaje" class="alert">
    {{ mensaje }}
  </div>

  <div *ngIf="!mensaje && habitacionId">
    <p><strong>Habitación ID:</strong> {{ habitacionId }}</p>
    <p><strong>Check-in:</strong> {{ checkin }}</p>
    <p><strong>Check-out:</strong> {{ checkout }}</p>
    
    <button class="btn" (click)="confirmar()" style="margin-top: 1rem; width: 100%;">Confirmar Reserva</button>
  </div>
</div>
