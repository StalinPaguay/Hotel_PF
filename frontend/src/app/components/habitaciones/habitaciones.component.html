<div class="card search-card">
  <h2>Buscar Habitaciones Libres</h2>
  <div class="form-row">
    <div class="form-group">
      <label>Check-in</label>
      <input type="date" [(ngModel)]="checkin">
    </div>
    <div class="form-group">
      <label>Check-out</label>
      <input type="date" [(ngModel)]="checkout">
    </div>
    <button class="btn" (click)="buscar()">Buscar</button>
  </div>
</div>

<div class="habitaciones-grid" *ngIf="habitaciones.length > 0">
  <div class="card room-card" *ngFor="let hab of habitaciones">
    <h3>Habitación {{hab.numero}}</h3>
    <p>Tipo: {{hab.tipo}}</p>
    <p>Precio/Noche: ${{hab.precio_noche}}</p>
    <p>Capacidad: {{hab.capacidad}} pers.</p>
    <button class="btn btn-outline" (click)="reservar(hab.id)">Reservar</button>
  </div>
</div>

<div *ngIf="habitaciones.length === 0 && checkin && checkout">
  <p style="text-align:center; color:gray;">Busca habitaciones para ver resultados.</p>
</div>
